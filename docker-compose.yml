version: "3.9"

services:
  crypto-ws:
    build: .
    container_name: crypto-price-server
    restart: unless-stopped
    ports:
      - "8080:8080"   # WebSocket server
      - "8000:8000"   # REST API
    environment:
      - WS_PORT=8080
      - HTTP_PORT=8000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
